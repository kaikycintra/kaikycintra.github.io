<main class="main-transition" style="padding-bottom: 25px;">
    <script>
      {
        async function getBlogs() {
          try {
            const response = await fetch('/pages/blogs/blogs.json');
            if (!response.ok) {
              throw new Error('Network response was not ok');
            }
            return await response.json();
          } catch (error) {
            console.error('There has been a problem with your fetch operation:', error);
          }
        }

        function renderBlog(blogData) {
          let blog = blogData
          const HTMLString =
          `
          <div class="col">
            <div class="card h-100 blog-post"
                hx-get="/pages/blogs/${blog.path}"
                hx-push-url="/blog/${blog.url}"
                hx-target="closest main"
                hx-swap="outerHTML transition:true show:window:top"
                data-category="${blog.category}">
              <img src="/static/${blog.image}" class="card-img-top" alt="tralalero tralala">
              <div class="card-body">
                <h3 class="card-title typewriter">${blog.title}</h3>
                <p class="card-text fs-6">${blog.description}</p>
              </div>
              <div class="card-footer">
                <small class="text-body-secondary">${blog.date}</small>
              </div>
            </div>
          </div>
          `
          let helper = document.createElement('div')
            
          helper.innerHTML = HTMLString.trim()
          const blogElement = helper.firstElementChild
          const blogsDiv = document.getElementById('blogs-div')

          blogsDiv.appendChild(blogElement)
        }

        function renderCategories() {
          let blogCards = document.getElementsByClassName('blog-post')
          let categoriesDiv = document.getElementById('categories-div')
          let buttonClasses = ['nav-link', 'fs-5']
  
          // initialize ids
          for(let i = 0; i < blogCards.length; i++) {
            blogCards[i].id = i
          }
  
          // store blogCards as initial state, not HTMLCollection
          blogCards = Array.from(document.getElementsByClassName('blog-post'))
  
  
          function filterCategory(category) {
            const blogsDiv = document.getElementById('blogs-div')
            blogsDiv.innerHTML = ''
  
            blogCards.forEach(blogCard => {
              if (blogCard.dataset.category === category || category === "all") {
                let wrapper = document.createElement('div');
                wrapper.classList.add('col', 'fade-in');
                wrapper.appendChild(blogCard);
                blogsDiv.appendChild(wrapper);
              }
            })
          }
  
          function styleButton(button) {
            buttonClasses.forEach(buttonClass => {
              button.classList.add(buttonClass)
            })
          }
  
          function createUnfilterButton() {
            let button = document.createElement('button')
            button.innerText = 'Todos'
            button.addEventListener('click', event => {
              filterCategory('all')
            })
  
            return button
          }
  
          function setupCategoriesButtons() {
            let categories = new Set()
            blogCards.forEach(blogCard => {
              let category = blogCard.dataset.category
              categories.add(category)
            });
    
            categories.forEach(category => {
              let anchor = document.createElement('a')
              anchor.innerText = category
              anchor.addEventListener('click', event => {
                filterCategory(category)
              })
    
              styleButton(anchor)
    
              categoriesDiv.appendChild(anchor)
            })
    
            let unfilterButton = createUnfilterButton()
            styleButton(unfilterButton)
            categoriesDiv.prepend(unfilterButton)
          }
  
          setupCategoriesButtons()
        }

        async function renderBlogPage() {
          const blogsDiv = document.getElementById('blogs-div')

          let blogs = await getBlogs()
          blogs = blogs.filter(obj => obj.category !== "Secreto")
          blogs.forEach(blog => renderBlog(blog))
          htmx.process(blogsDiv);

          renderCategories()
        }

        async function RenderSecret() {
          const blogsDiv = document.getElementById('blogs-div')

          if (Boolean(window.localStorage.getItem('secret'))) {
            let blogs = await getBlogs()
            if (blogs) {
              let secretBlog = blogs.find(obj => obj.category == "Secreto")
              renderBlog(secretBlog)
              htmx.process(blogsDiv);
            }
            window.localStorage.removeItem('secret')
          }
        }
        
        renderBlogPage()
        RenderSecret()
    }

    </script>
    <p class="fs-1 cursor"> Blog</p>
    <p class="fs-3">Categorias</p>
    <div id="categories-div"
         class="nav-underline"
         style="display: flex; width: 100%; overflow-x: scroll; margin-bottom: 1rem; gap: 1rem;">
    </div>
    <div id="blogs-div" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
    </div>
</main>
